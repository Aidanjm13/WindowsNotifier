name: Build Executables

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller

      - run: pyinstaller --onefile --windowed --name NotificationSystem GUI.py

      - uses: actions/upload-artifact@v4
        with:
          name: NotificationSystem-${{ matrix.os }}
          path: dist/*