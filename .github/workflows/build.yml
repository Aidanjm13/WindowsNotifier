name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: NotificationSystem
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller

      - run: pyinstaller --onefile --windowed --name NotificationSystem GUI.py

      - name: Package Windows
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/NotificationSystem.exe -DestinationPath dist/NotificationSystem-windows.zip

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          chmod +x dist/NotificationSystem.app/Contents/MacOS/NotificationSystem
          ditto -c -k --sequesterRsrc --keepParent dist/NotificationSystem.app dist/NotificationSystem-macos.zip

      - name: Package Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/NotificationSystem
          tar -czvf dist/NotificationSystem-linux.tar.gz dist/NotificationSystem

      - uses: actions/upload-artifact@v4
        with:
          name: NotificationSystem-${{ matrix.os }}
          path: |
            NotificationSystem/dist/*.zip
            NotificationSystem/dist/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*