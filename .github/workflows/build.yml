name: Build Executables

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-22.04
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: NotificationSystem
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyinstaller

      - run: pyinstaller --onefile --windowed --name NotificationSystem GUI.py

      - uses: actions/upload-artifact@v4
        with:
          name: NotificationSystem-${{ matrix.os }}
          path: NotificationSystem/dist/*